name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex-claude-bridge-min-overhead

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck ripgrep python3

      - name: Lint (bash syntax + shellcheck + python)
        run: |
          chmod +x bin/test-lint
          ./bin/test-lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep python3

      - name: Codex Sync Smoke Test
        run: |
          chmod +x bin/test-codex-skill-sync
          ./bin/test-codex-skill-sync

      - name: Config Portability Smoke Test
        run: |
          chmod +x bin/test-portable-configs
          ./bin/test-portable-configs

      - name: Installer Idempotency Smoke Test
        run: |
          chmod +x bin/test-install-idempotent
          ./bin/test-install-idempotent
